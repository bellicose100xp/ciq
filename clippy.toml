# Determinism guard (dev/PLAN.md §0/D5, §4.4): ban ambient wall-clock / RNG in library logic.
# A flaky test gives a false fix signal and breaks the AI build->test->fix loop, so time must
# enter logic as a `u64` parameter (the debouncer's time-as-parameter design) and randomness
# must be explicitly seeded. The only legitimate callers are the named seam wrappers.
#
# Enforced by the existing `cargo clippy ... -D warnings` invocation (no separate CI gate —
# it rides the lint gate). When a seam wrapper genuinely needs the clock, allow it locally
# with `#[allow(clippy::disallowed_methods)]` and a comment naming why it's a seam.
# Note: only methods reachable from ciq's dependency tree can be listed — clippy warns on an
# unresolvable path. ciq has no `rand` dependency, so the RNG bans are documented here for when
# one is ever added, not listed above. The wall-clock bans are the load-bearing ones.
disallowed-methods = [
    { path = "std::time::Instant::now", reason = "nondeterministic clock; thread a u64 timestamp through instead (see debouncer / logging seams)" },
    { path = "std::time::SystemTime::now", reason = "nondeterministic clock; thread a u64 timestamp through instead" },
    # When `rand` becomes a dependency, re-add:
    #   { path = "rand::random", reason = "unseeded RNG breaks determinism; use an explicit seed" },
    #   { path = "rand::thread_rng", reason = "unseeded RNG breaks determinism; use an explicit seed" },
]
