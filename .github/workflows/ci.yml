name: CI

# ciq CI — the 4-gate set from dev/PLAN.md §0/D5: Test, Lint (fmt + clippy incl. the
# disallowed-methods determinism gate), Coverage (tiered: warn-only project-wide + hard
# pure-core branch floor + hard shell-marker containment). There is NO separate build job
# and NO binary gate.
#
# Note: DuckDB is bundled (compiled in-tree), so the first build on a cold runner is slow
# (~2min). The Swatinem/rust-cache action caches it across runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      # Single-threaded is load-bearing (worker/channel + TestBackend tests). Never --lib.
      - name: Run tests
        run: cargo test --all-features -- --test-threads=1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      # clippy carries the clippy.toml `disallowed-methods` determinism gate (no extra job).
      - name: Clippy (incl. determinism disallowed-methods gate)
        run: cargo clippy --all-targets --all-features -- -D warnings

  shell-containment:
    name: Shell Containment
    # HARD gate (D5): the human-validated shell surface (§4.7) must not silently grow. A
    # `// ciq:shell-exempt` marker may appear ONLY on files listed in dev/shell-exempt.txt.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell-exempt markers stay within the §4.7 allowlist
        run: bash dev/ci/check-shell-exempt.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      # Project-wide coverage report. WARN-only (D5): we do NOT fail the build on the overall
      # percentage; the report is informational and surfaced as an annotation.
      #
      # Shell-exempt files (the §4.7 human surface — real-terminal paint/raw-mode input) cannot be
      # exercised headlessly, so they are excluded from the coverage denominator (§4.6: the
      # enumerated shell files are listed in tarpaulin's --exclude-files). The exclusion is driven
      # by the single source of truth, dev/shell-exempt.txt, so it can never drift from the
      # marker-containment gate.
      - name: Generate coverage report
        shell: bash
        run: |
          excludes=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in \#*) continue ;; esac
            excludes+=(--exclude-files "$f")
          done < <(grep -vE '^\s*(#|$)' dev/shell-exempt.txt || true)
          cargo tarpaulin --out Xml --out Html --output-dir coverage "${excludes[@]}" -- --test-threads=1
      # WARN-only project-wide 95% target: annotate below 95%, never fail.
      - name: Warn if project-wide coverage < 95%
        run: bash dev/ci/coverage-warn.sh 95 coverage/cobertura.xml
      # HARD floor (D5): pure-core modules must meet the branch/line floor. Pure functions
      # can't be coverage-padded, so this is the high-value, gaming-free hard gate.
      - name: Enforce pure-core coverage floor
        run: bash dev/ci/core-floor.sh coverage/cobertura.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
