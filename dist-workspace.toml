[workspace]
members = ["cargo:."]

# Config for 'dist' (cargo-dist). Kept deliberately minimal: shell installer only
# (curl-based install), no Homebrew tap, no crates.io publish. DuckDB is bundled,
# so each target compiles DuckDB's C++ in-tree — release builds are slow but the
# produced binary is fully self-contained.
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.2"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false

# Stock ubuntu runners lack a musl C++ cross-toolchain, which the bundled
# DuckDB build needs (x86_64-linux-musl-g++). This image ships the full musl
# cross toolchain with CC/CXX/linker pre-wired, producing a fully static
# binary that runs on old-glibc hosts (e.g. AL2) and Alpine.
[dist.github-custom-runners.x86_64-unknown-linux-musl]
runner = "ubuntu-22.04"
container = { image = "messense/rust-musl-cross:x86_64-musl", host = "x86_64-unknown-linux-gnu" }
